<!DOCTYPE html>
<html>
<head>
    <title>User Input Validation</title>

    <!-- Creative styling -->
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        #container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background-color: #333;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        #submitBtn {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>

    <!-- Link to JavaScript file -->
    <script src="strings.js"></script>
</head>

<body>

<div id="container">

    <!-- Page header -->
    <h2>User Validation Portal</h2>

    <!-- All inputs must be inside ONE form -->
    <form id="userForm" onsubmit="return validateForm()">

        <!-- First name input -->
        <input type="text" id="firstName" placeholder="Enter First Name">

        <!-- Last name input -->
        <input type="text" id="lastName" placeholder="Enter Last Name">

        <!-- Zip code input -->
        <input type="text" id="zip" placeholder="Enter 5-digit ZIP Code">

        <!-- Submit button -->
        <input type="submit" id="submitBtn" value="Submit">

    </form>

    <!-- Output area for validation + secret message -->
    <div id="message"></div>

</div>

</body>
</html>
