<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quark's High-Low Casino</title>

    <!-- Linking the external JavaScript file -->
    <script src="code.js"></script>
</head>

<body>

    <!-- PAGE HEADER -->
    <header>
        <h1>Welcome to Quark's High‑Low Casino!</h1>
        <h3>Try your luck, human…</h3>
    </header>

    <!-- FORM FOR USER INPUT (required by assignment) -->
    <!-- The form calls playGame() when submitted -->
    <form onsubmit="playGame(); return false;">
        <!-- Label for the input -->
        <label for="playerNumber">Enter a number (1–10):</label><br>

        <!-- User input field -->
        <input type="number" id="playerNumber" min="1" max="10" required><br><br>

        <!-- Button to play the game -->
        <input type="submit" value="Play Game">
    </form>

    <!-- AREA WHERE GAME RESULTS WILL APPEAR -->
    <p id="gameOutput"></p>

</body>
</html>
